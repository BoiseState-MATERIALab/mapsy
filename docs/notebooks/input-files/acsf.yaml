control:
  debug : True
  verbosity : 0
  output : test.out

system:
  systemtype : ions
  file:
    fileformat : xyz+
    folder : ./data-files
    root : MoS2_defect
    units : alat
  dimension : 2
  axis : 2

contactspace:
  mode : ionic
  radiusmode : muff
  alpha : 1.12
  spread : 1.0
  cutoff : 10

symmetryfunctions:
  functions:
    - type: ac
      cutoff : cos
      radius: 5.
      order: 200
      compositional: False
      structural: True
      radial: True
    - type: ac
      cutoff : cos
      radius: 5.
      order: 80
      compositional: False
      structural: True
      radial: False
