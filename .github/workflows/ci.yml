name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[tester,linter,mypy,formatter]
      - name: Lint
        run: |
          ruff --version
          ruff .
          black --check .
      - name: Type check
        run: |
          mypy .
      - name: Tests
        run: |
          pytest -q
